<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --p1: #5DCAA5;
    --p2: #F0997B;
    --win: #5DCAA5;
    --lose: #F0997B;
    --draw: #EF9F27;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    letter-spacing: 0.08em;
    text-align: center;
    margin-bottom: 0.25rem;
    color: var(--text);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 2.5rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 2.5rem;
    align-items: center;
  }

  .player-score {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .player-score.p1 { border-top: 2px solid var(--p1); }
  .player-score.p2 { border-top: 2px solid var(--p2); }

  .player-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .p1 .player-label { color: var(--p1); }
  .p2 .player-label { color: var(--p2); }

  .player-name-display {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    min-height: 18px;
  }

  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    line-height: 1;
    color: var(--text);
  }

  .draws-box {
    text-align: center;
  }

  .draws-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: block;
    margin-bottom: 4px;
  }

  .draws-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--muted);
  }

  .arena {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    width: 100%;
    max-width: 480px;
    margin-bottom: 1.5rem;
  }

  .choice-display {
    flex: 1;
    text-align: center;
  }

  .choice-display .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    display: block;
  }
  .choice-display.p1 .label { color: var(--p1); }
  .choice-display.p2 .label { color: var(--p2); }

  .choice-emoji {
    font-size: 3.5rem;
    line-height: 1;
    display: block;
    min-height: 56px;
    transition: transform 0.2s ease;
  }

  .choice-emoji.pop {
    animation: pop 0.35s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--border);
    letter-spacing: 0.05em;
  }

  .result-banner {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.06em;
    min-height: 2rem;
    margin-bottom: 2rem;
    transition: color 0.2s;
  }

  .result-banner.win { color: var(--win); }
  .result-banner.lose { color: var(--lose); }
  .result-banner.draw { color: var(--draw); }
  .result-banner.neutral { color: var(--muted); }

  .controls {
    width: 100%;
    max-width: 480px;
  }

  .turn-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: center;
    margin-bottom: 12px;
    min-height: 18px;
  }
  .turn-label.p1 { color: var(--p1); }
  .turn-label.p2 { color: var(--p2); }

  .choices {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 1rem;
  }

  .choice-btn {
    font-size: 2rem;
    width: 80px;
    height: 80px;
    border-radius: 12px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    color: var(--text);
  }

  .choice-btn:hover { transform: scale(1.08); border-color: #444; background: #222; }
  .choice-btn:active { transform: scale(0.95); }
  .choice-btn.selected-p1 { border: 2px solid var(--p1); background: #0f2e25; }
  .choice-btn.selected-p2 { border: 2px solid var(--p2); background: #2e1a12; }

  .action-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s, border-color 0.15s;
    margin-bottom: 8px;
  }

  .action-btn:hover { background: #222; border-color: #444; }
  .action-btn:active { transform: scale(0.99); }
  .action-btn.primary { border-color: var(--p1); color: var(--p1); }
  .action-btn.primary:hover { background: #0f2e25; }

  .setup-screen {
    width: 100%;
    max-width: 480px;
  }

  .setup-screen h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .input-group {
    margin-bottom: 12px;
  }

  .input-group label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .input-group.p1 label { color: var(--p1); }
  .input-group.p2 label { color: var(--p2); }

  .input-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-group input:focus { border-color: #555; }

  .hidden { display: none !important; }

  .round-indicator {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .hidden-move {
    font-size: 3.5rem;
    filter: blur(12px);
    user-select: none;
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    padding: 4px;
    display: block;
    margin: 0 auto;
  }
  .reset-btn:hover { color: var(--text); }
</style>
</head>
<body>

<h1>Rock Paper Scissors</h1>
<p class="subtitle">2 players &mdash; same screen</p>

<div id="setup-screen" class="setup-screen">
  <h2>Enter player names</h2>
  <div class="input-group p1">
    <label>Player 1</label>
    <input type="text" id="name-p1" placeholder="e.g. Rachel" maxlength="20" />
  </div>
  <div class="input-group p2" style="margin-bottom: 1.5rem;">
    <label>Player 2</label>
    <input type="text" id="name-p2" placeholder="e.g. Friend" maxlength="20" />
  </div>
  <button class="action-btn primary" onclick="startGame()">Start game</button>
</div>

<div id="game-screen" class="hidden" style="width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center;">

  <div class="scoreboard">
    <div class="player-score p1">
      <div class="player-label">Player 1</div>
      <div class="player-name-display" id="disp-p1"></div>
      <div class="score-num" id="score-p1">0</div>
    </div>
    <div class="draws-box">
      <span class="draws-label">Draws</span>
      <div class="draws-num" id="score-draw">0</div>
    </div>
    <div class="player-score p2">
      <div class="player-label">Player 2</div>
      <div class="player-name-display" id="disp-p2"></div>
      <div class="score-num" id="score-p2">0</div>
    </div>
  </div>

  <div class="round-indicator" id="round-indicator">Round 1</div>

  <div class="arena">
    <div class="choice-display p1">
      <span class="label">P1</span>
      <span class="choice-emoji" id="emoji-p1">&#8212;</span>
    </div>
    <div class="vs">VS</div>
    <div class="choice-display p2">
      <span class="label">P2</span>
      <span class="choice-emoji" id="emoji-p2">&#8212;</span>
    </div>
  </div>

  <div class="result-banner neutral" id="result-banner">Choose your move</div>

  <div class="controls">
    <div class="turn-label p1" id="turn-label">Player 1 &mdash; pick your move</div>
    <div class="choices" id="choice-btns">
      <button class="choice-btn" onclick="pick('rock')" title="Rock">&#129704;</button>
      <button class="choice-btn" onclick="pick('paper')" title="Paper">&#128196;</button>
      <button class="choice-btn" onclick="pick('scissors')" title="Scissors">&#9986;</button>
    </div>
    <button class="action-btn hidden" id="reveal-btn" onclick="reveal()">Reveal moves</button>
    <button class="action-btn hidden" id="next-btn" onclick="nextRound()">Next round</button>
    <button class="reset-btn" onclick="resetGame()">Reset game</button>
  </div>
</div>

<script>
  const EMOJI = { rock: '&#129704;', paper: '&#128196;', scissors: '&#9986;' };
  const HIDDEN = '&#128065;';

  let names = ['', ''];
  let scores = [0, 0, 0];
  let round = 1;
  let phase = 'p1';
  let moves = ['', ''];

  function startGame() {
    const n1 = document.getElementById('name-p1').value.trim() || 'Player 1';
    const n2 = document.getElementById('name-p2').value.trim() || 'Player 2';
    names = [n1, n2];
    document.getElementById('disp-p1').textContent = n1;
    document.getElementById('disp-p2').textContent = n2;
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    resetRound();
  }

  function resetRound() {
    moves = ['', ''];
    phase = 'p1';
    document.getElementById('emoji-p1').innerHTML = '&mdash;';
    document.getElementById('emoji-p2').innerHTML = '&mdash;';
    document.getElementById('result-banner').textContent = 'Choose your move';
    document.getElementById('result-banner').className = 'result-banner neutral';
    document.getElementById('turn-label').textContent = names[0] + ' \u2014 pick your move';
    document.getElementById('turn-label').className = 'turn-label p1';
    document.getElementById('choice-btns').classList.remove('hidden');
    document.getElementById('reveal-btn').classList.add('hidden');
    document.getElementById('next-btn').classList.add('hidden');
    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected-p1','selected-p2'));
  }

  function pick(choice) {
    if (phase === 'p1') {
      moves[0] = choice;
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected-p1'));
      event.currentTarget.classList.add('selected-p1');
      document.getElementById('emoji-p1').innerHTML = HIDDEN;
      setTimeout(() => {
        phase = 'p2';
        document.getElementById('turn-label').textContent = names[1] + ' \u2014 pick your move';
        document.getElementById('turn-label').className = 'turn-label p2';
        document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected-p1','selected-p2'));
        document.getElementById('result-banner').textContent = names[0] + ' has chosen. Pass the screen!';
      }, 300);
    } else if (phase === 'p2') {
      moves[1] = choice;
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected-p2'));
      event.currentTarget.classList.add('selected-p2');
      document.getElementById('emoji-p2').innerHTML = HIDDEN;
      setTimeout(() => {
        phase = 'reveal';
        document.getElementById('choice-btns').classList.add('hidden');
        document.getElementById('reveal-btn').classList.remove('hidden');
        document.getElementById('turn-label').textContent = 'Both ready \u2014 reveal!';
        document.getElementById('turn-label').className = 'turn-label';
        document.getElementById('result-banner').textContent = 'Both picked. Reveal when ready!';
      }, 300);
    }
  }

  function reveal() {
    const e1 = document.getElementById('emoji-p1');
    const e2 = document.getElementById('emoji-p2');
    e1.innerHTML = EMOJI[moves[0]];
    e2.innerHTML = EMOJI[moves[1]];
    e1.classList.add('pop'); e2.classList.add('pop');
    setTimeout(() => { e1.classList.remove('pop'); e2.classList.remove('pop'); }, 400);

    const banner = document.getElementById('result-banner');
    if (moves[0] === moves[1]) {
      banner.textContent = "It's a draw!";
      banner.className = 'result-banner draw';
      scores[2]++;
    } else if (beats(moves[0], moves[1])) {
      banner.textContent = names[0] + ' wins this round!';
      banner.className = 'result-banner win';
      scores[0]++;
    } else {
      banner.textContent = names[1] + ' wins this round!';
      banner.className = 'result-banner lose';
      scores[1]++;
    }

    document.getElementById('score-p1').textContent = scores[0];
    document.getElementById('score-p2').textContent = scores[1];
    document.getElementById('score-draw').textContent = scores[2];
    document.getElementById('reveal-btn').classList.add('hidden');
    document.getElementById('next-btn').classList.remove('hidden');
    document.getElementById('turn-label').textContent = '';
  }

  function nextRound() {
    round++;
    document.getElementById('round-indicator').textContent = 'Round ' + round;
    resetRound();
  }

  function beats(a, b) {
    return (a==='rock'&&b==='scissors')||(a==='paper'&&b==='rock')||(a==='scissors'&&b==='paper');
  }

  function resetGame() {
    scores = [0, 0, 0];
    round = 1;
    document.getElementById('round-indicator').textContent = 'Round 1';
    document.getElementById('score-p1').textContent = 0;
    document.getElementById('score-p2').textContent = 0;
    document.getElementById('score-draw').textContent = 0;
    document.getElementById('setup-screen').classList.remove('hidden');
    document.getElementById('game-screen').classList.add('hidden');
  }

  document.getElementById('name-p1').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('name-p2').focus(); });
  document.getElementById('name-p2').addEventListener('keydown', e => { if(e.key==='Enter') startGame(); });
</script>
</body>
</html>
